config_version: "1.1.0"

# All monetary reference values are denominated in CNY as a reference baseline.
# The model engine receives values already converted to deal currency by the orchestration layer.
#
# hardware_cost_per_light_cny: fixture + controller unit cost ex-works (vendor quote).
# installation_cost_per_light_cny: on-site labor per light — rigging, wiring, commissioning.
#   Kept separate because: (a) it varies by site/city more than hardware does,
#   (b) solar/battery lamps have no cable pull so install is faster and cheaper,
#   (c) the sales rep can negotiate hardware and install independently.
#   Does NOT include trenching (E2×E3 from questionnaire) — that is additive civil works.
#
# our_failure_rate_pct: HPWinner product annual failure rate (% of fleet per year).
#   Compare against conventional_failure_rate_pct for savings attribution.
#   Source for all: HPWinner product spec sheets and accelerated aging test reports.

products:

  ai_road_lamp:
    display_name: "AI Road Lamp (Grid-Connected)"
    hardware_cost_per_light_cny: 1400     # fixture + NB-IoT controller (ex-works)
    installation_cost_per_light_cny: 400  # mounting, cable pull to pole, commissioning
    expected_lifetime_yrs: 12
    rated_wattage_W: 80              # typical spec; C2 from questionnaire overrides per-deal
    connectivity_options:
      - "4G"
      - "5G"
      - "NB-IoT"
    trenching_required: true         # requires mains cable to each pole
    our_failure_rate_pct: 2.0        # % of fleet per year (HPWinner spec)
    conventional_failure_rate_pct: 8.0   # typical HPS / standard LED baseline (A7-dependent)
    platform_fee_per_light_yr_cny: 60    # IoT platform + SIM/connectivity annual fee
    warranty_yrs: 5
    dimming_capable: true
    solar_capable: false
    battery_backup_hrs: 0
    poles_reusable: true             # can mount on existing poles (E5 from questionnaire)
    grid_dependent: "full"

  ai_battery_lamp:
    display_name: "AI Battery Lamp (Off-Grid / Hybrid)"
    hardware_cost_per_light_cny: 1900     # fixture + LFP battery pack + controller (ex-works)
    installation_cost_per_light_cny: 500  # mounting + battery commissioning; no cable pull
    expected_lifetime_yrs: 10        # battery cycle life (LFP ~3000 cycles) limits horizon
    rated_wattage_W: 60
    connectivity_options:
      - "NB-IoT"
      - "LoRa"
    trenching_required: false        # no mains cable; charges from grid or partial solar
    our_failure_rate_pct: 3.0        # battery adds one more failure mode vs pure grid
    conventional_failure_rate_pct: 8.0
    platform_fee_per_light_yr_cny: 48
    warranty_yrs: 3                  # battery warranty period shorter than fixture
    dimming_capable: true
    solar_capable: false             # grid-charged battery; not to be confused with solar lamp
    battery_backup_hrs: 6            # sustains operation during grid outages
    poles_reusable: true
    grid_dependent: "partial"        # grid charges battery; outage triggers backup mode

  ai_solar_lamp:
    display_name: "AI Solar Lamp (Solar + IoT)"
    hardware_cost_per_light_cny: 2700     # solar panel + LFP battery + controller + integrated pole
    installation_cost_per_light_cny: 500  # pole erection + anchor + commissioning; no cable pull
    expected_lifetime_yrs: 10
    rated_wattage_W: 50              # lower wattage; constrained by solar energy budget
    connectivity_options:
      - "NB-IoT"
      - "LoRa"
    trenching_required: false        # no grid cable; self-contained
    our_failure_rate_pct: 2.5        # panel degradation adds failure mode; controller same
    conventional_failure_rate_pct: 8.0
    platform_fee_per_light_yr_cny: 48
    warranty_yrs: 3
    dimming_capable: true
    solar_capable: true
    battery_backup_hrs: 12           # designed for full-night autonomous operation
    poles_reusable: false            # requires integrated solar pole (new pole in all cases)
    grid_dependent: "none"           # E1 trenching cost becomes irrelevant for this product
