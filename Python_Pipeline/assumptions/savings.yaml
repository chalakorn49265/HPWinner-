config_version: "1.0.0"

# Savings mechanisms — the five distinct economic effects of the HPWinner product.
#
# driver: "questionnaire" → computed deterministically from intake inputs, not a slider.
#         "slider"        → a modellable assumption; shown in UI Tab 2 with source citation.
#
# confidence levels:
#   high        → verifiable from spec sheets or 3+ validated deployments
#   medium      → validated in 1–2 pilots or corroborated by credible third-party literature
#   speculative → internal claim or extrapolated; no HPWinner pilot data yet
#
# applies_to: list of product keys from products.yaml, or ["all"]
#
# IMPORTANT: wattage_reduction has driver="questionnaire" — it is NOT a slider.
# It is listed here so the savings attribution waterfall can include it with its source.
# The model engine computes it as (1 - C2/C1) applied to annual kWh, deterministically.

mechanisms:

  wattage_reduction:
    display_name: "Wattage reduction (C1 → C2)"
    description: >
      Energy saving from replacing existing fixtures (C1 watts) with HPWinner fixtures (C2 watts).
      Computed deterministically from questionnaire inputs — NOT a slider. The saving percentage
      equals (1 − C2/C1); annual kWh saving = (C1−C2) × C3 hours/night × 365 × A5 lights.
      Electricity cost saving = kWh saved × C6 tariff. This is the single largest and most
      defensible saving; it can be verified from spec sheets before any pilot.
    driver: "questionnaire"
    applies_to: ["all"]
    confidence: "high"
    source: >
      IEC 62612 / IEC 62722 fixture spec sheets for C1 (existing) and C2 (HPWinner).
      Verified against metered baseline in Hangzhou pilot 2024. No assumption required.

  adaptive_dimming:
    display_name: "Adaptive dimming (AI control)"
    description: >
      After wattage reduction, the AI controller further dims lights during low-traffic hours
      (typically 22:00–05:00). Applied as an additional % reduction on post-wattage energy.
      Separate from wattage reduction because it depends on traffic patterns, not fixture specs.
      The slider represents the effective dimming depth averaged across the operating year.
    driver: "slider"
    applies_to: ["all"]
    unit: "% further reduction on post-wattage annual energy"
    min_pct: 0.0
    default_pct: 12.0
    max_pct: 25.0
    confidence: "medium"
    source: >
      HPWinner Hangzhou pilot 2024 (n=320 lights, 6 months): 11–14% additional saving on top
      of wattage reduction. Upper bound (25%) from Philips Oslo smart city programme 2021.
      Use lower bound (≤10%) for high-traffic arterial roads with little late-night dimming window.

  predictive_maintenance_inspections:
    display_name: "Predictive maintenance — inspection round reduction"
    description: >
      AI fault prediction (sensor + platform analytics) flags likely failures before they occur,
      reducing the number of scheduled manual inspection rounds (D2 rounds/year). Each round
      avoided saves D3 person-days × labor rate + D4 vehicle-days × vehicle rate.
      Does not eliminate reactive repairs (D5 tickets); modeled separately.
    driver: "slider"
    applies_to: ["all"]
    unit: "% reduction in D2 annual inspection rounds"
    min_pct: 0.0
    default_pct: 30.0
    max_pct: 55.0
    confidence: "medium"
    source: >
      Smart Lighting Alliance 2023 meta-study: 25–55% round reduction across 8 municipal deployments.
      No HPWinner-specific multi-city pilot data yet. Use 30% (midpoint) as default;
      raise toward 50% only if customer has abnormally high D2 baseline (≥24 rounds/year).

  predictive_maintenance_tickets:
    display_name: "Predictive maintenance — fault ticket reduction"
    description: >
      Early fault detection catches controller and driver failures before full outage,
      reducing unplanned repair incidents (D5 tickets/year). Each ticket avoided saves
      the average repair cost per incident (financial.yaml: repair_cost_per_ticket).
      Distinct from inspection reduction: some tickets are generated by inspectors (reduced
      via D2 lever), others are reactive call-ins; this lever targets the latter.
    driver: "slider"
    applies_to: ["all"]
    unit: "% reduction in D5 annual fault tickets"
    min_pct: 0.0
    default_pct: 25.0
    max_pct: 50.0
    confidence: "speculative"
    source: >
      HPWinner internal product claim: 20–30% ticket reduction. Not yet validated in a
      multi-site controlled pilot. Flag this assumption as speculative in CEO presentations
      until Q3 2026 pilot data is available. Treat 15% as a conservative floor.

  failure_rate_reduction:
    display_name: "Fixture failure rate improvement"
    description: >
      HPWinner fixtures have a lower annual failure rate (our_failure_rate_pct from products.yaml)
      than the customer's existing stock (A9 from questionnaire, or product default
      conventional_failure_rate_pct if A9 not provided). Fewer failures mean fewer replacements,
      reducing the fixture-replacement portion of the annual capex budget (B3).
      The model attributes the B3 saving proportionally to the failure rate differential.
    driver: "slider"
    applies_to: ["all"]
    unit: "% lower annual failure rate vs baseline fixture type (A7)"
    min_pct: 0.0
    default_pct: 60.0
    max_pct: 80.0
    confidence: "high"
    source: >
      HPWinner LED fixture MTBF: 50,000 hours (LM-80 / TM-21 validated).
      HPS baseline MTBF: ~12,000 hours. Standard LED baseline: ~25,000 hours.
      Default 60% reduction calibrated for HPS→HPWinner; use 30–40% for LED→HPWinner replacement.
      Source: HPWinner reliability test report RT-2025-007 and DOE SSL program data.

  solar_grid_offset:
    display_name: "Solar electricity offset (solar product only)"
    description: >
      For AI Solar Lamp: the fraction of annual lighting electricity demand met by the
      on-board solar panel, reducing grid consumption to near zero during sunny periods.
      Remaining grid draw occurs during extended cloudy periods (battery depleted).
      Applied as a % reduction on the post-wattage annual electricity cost.
      Varies by geographic latitude and irradiance; A3 (geo scope) informs the default.
    driver: "slider"
    applies_to: ["ai_solar_lamp"]
    unit: "% of annual kWh demand met by solar"
    min_pct: 50.0
    default_pct: 75.0
    max_pct: 90.0
    confidence: "medium"
    source: >
      NREL PVWatts v8 estimates for subtropical China (lat 20–30°N, GHI 4.5–5.5 kWh/m²/day):
      75–85% offset for 100Wp panel on 50W load with 150Wh battery.
      Lower bound (50%) applies to northern provinces (lat >35°N) or high-cloud regions.
      Upper bound (90%) applies to Yunnan / Hainan / Guangdong coastal.
      Default 75% calibrated for Chongqing / Sichuan climate (cloudy basin, conservative).
